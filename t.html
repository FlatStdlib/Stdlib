<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio</title>

<style>
:root {
    --bg: #0a0a12;
    --card: #111126;
    --accent: #a78bfa;
    --accent2: #f472b6;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --glow: rgba(167, 139, 250, 0.35);
}

/* RESET */
html, body {
    margin: 0;
}

/* BODY — NO vertical centering (IMPORTANT) */
body {
    min-height: 100vh;
    font-family: system-ui, sans-serif;
    color: var(--text);
    background: radial-gradient(circle at top, #1a1033, var(--bg));

    display: flex;
    justify-content: center;

    padding: 40px 0;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 1200px;
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 32px;
}

/* CARD */
.card {
    background: linear-gradient(180deg, #14142a, var(--card));
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 20px 40px rgba(0,0,0,0.6),
        0 0 50px var(--glow);
    position: relative;
    overflow: hidden;
}

/* GLOW BORDER */
.card::before {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    background: linear-gradient(
        120deg,
        transparent,
        var(--accent),
        var(--accent2),
        transparent
    );
    opacity: 0.2;
    pointer-events: none;
}

/* HERO */
.hero {
    display: grid;
    grid-template-columns: 40% 60%;
    gap: 24px;
}

/* LEFT */
.hero-left {
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
}

.avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 35px var(--glow);
}

.avatar img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
}

.hero-left h1 {
    margin: 0;
}

.hero-left span {
    color: var(--muted);
}

/* RIGHT */
.hero-right {
    padding: 32px;
}

.hero-right h2 {
    margin-top: 0;
}

.hero-right p {
    color: var(--muted);
    line-height: 1.6;
}

/* SOCIALS */
.socials {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 16px;
}

.socials a {
    text-decoration: none;
    color: var(--text);
    padding: 10px;
    align-items: center;
    border-radius: 999px;
    /* border: 1px solid rgba(255,255,255,0.1); */
    /* background: rgba(255,255,255,0.03); */
    transition: 0.2s;
    display: inline-block;
}

.social_ico {
    display: inline-block;
    vertical-align: middle;
    width: 35px;
    length: 35px;
}

.social_text {
    display: inline-block;
}

.socials a:hover {
    border-color: var(--accent);
    box-shadow: 0 0 25px var(--glow);
    transform: translateY(-2px);
}

/* DEV SECTION (THIS IS WHAT GROWS THE PAGE) */
.dev {
    padding: 40px;
}

.dev h3 {
    margin-top: 0;
    font-size: 1.8rem;
}

.dev p {
    color: var(--muted);
    line-height: 1.7;
    max-width: 900px;
}

/* RESPONSIVE */
@media (max-width: 900px) {
    .hero {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- HERO (TOP 2 BOXES) -->
    <div class="hero">

        <div class="card hero-left">
            <div class="avatar">
                <img src="https://images-ext-1.discordapp.net/external/ddQFgG3kuUHgzCK3DUayWxpymC11zcMRR-nKjT3SFwY/%3Fsize%3D1024/https/cdn.discordapp.com/avatars/1440844781218431029/622ecd1d186aeb37a9ecfa24e8496282.png?format=webp&quality=lossless" alt="Avatar">
            </div>
            <h1>@Algo</h1>
            <span>Low-Level Software Engineer</span>
        </div>

        <div class="card hero-right">
            <div class="socials">
                <a href="#">
                    <img style="display: inline-block; vertical-align: middle;" src="https://abs.twimg.com/favicons/twitter.3.ico">
                    <p class="social_text">@Algo1337</p>
                </a>
                <a href="#">
                    <img class="social_ico" src="https://cdn.prod.website-files.com/6257adef93867e50d84d30e2/6266bc493fb42d4e27bb8393_847541504914fd33810e70a0ea73177e.ico">
                    <p class="social_text">heineken_t</p>
                </a>
                <a href="#">
                    <img class="social_ico" src="https://www.youtube.com/s/desktop/af4a6a17/img/favicon.ico">
                    <p class="social_text">@Algo1337</p>
                </a>
            </div>

            <h2>Bio</h2>
            <p>
            </p>
        </div>

    </div>

    <!-- DEV (BOTTOM EXPANDING BOX) -->
    <div class="card dev">
        <h3>About Me</h3>
        <p>
            <br><br>
        </p>
    </div>

</div>

</body>
</html>
